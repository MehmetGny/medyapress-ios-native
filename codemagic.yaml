workflows:
  ios-webview-debug:
    name: MedyaPress iOS WebView Debug
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Create Xcode project
        script: xcodegen generate
      - name: Build simulator app
        script: xcodebuild -project MedyaPress.xcodeproj -scheme MedyaPress -configuration Debug -sdk iphonesimulator -derivedDataPath build
    artifacts:
      - build/Build/Products/Debug-iphonesimulator/*.app
